<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Defender Pro</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }
        .stats-bar {
            display: flex;
            gap: 30px;
            font-size: 22px;
            padding: 15px;
            background: #222;
            width: 100%;
            justify-content: center;
            border-bottom: 2px solid #444;
        }
        canvas {
            background-color: #1a1a1a;
            border: 3px solid #333;
            margin-top: 20px;
            cursor: crosshair;
        }
        .shop {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 10px;
            background: #222;
            border-radius: 10px;
        }
        .tower-btn {
            padding: 10px;
            border: 2px solid #444;
            background: #333;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            font-size: 12px;
            transition: 0.2s;
        }
        .tower-btn:hover { background: #444; }
        .tower-btn.selected {
            border-color: #00f2ff;
            background: #004444;
        }
        .tower-btn span { display: block; font-weight: bold; margin-bottom: 4px; }

        /* START SCREEN STYLES */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .menu-card {
            background: #222;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00f2ff;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }
        .menu-card h1 { font-size: 48px; margin: 0 0 20px 0; color: #00f2ff; }
        .gamble-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(45deg, #ff00ff, #00f2ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gamble-btn:hover { transform: scale(1.1); }
        .start-btn {
            padding: 10px 30px;
            font-size: 18px;
            background: #444;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        #result-text {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <!-- Start/Gamble Overlay -->
    <div id="overlay">
        <div class="menu-card">
            <h1>NEON DEFENDER</h1>
            <p>Before you start, will you take a risk?</p>
            <button class="gamble-btn" onclick="gamble()">FLIP COIN</button>
            <div id="result-text"></div>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div class="stats-bar">
        <div>💰 $<span id="money">150</span></div>
        <div>❤️ <span id="lives">10</span></div>
        <div>🌊 Wave: <span id="wave">1</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="shop" id="shop"></div>
    <p style="color: #666; font-size: 12px;">Click empty space to BUILD | Click tower to UPGRADE</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const moneyEl = document.getElementById('money');
        const livesEl = document.getElementById('lives');
        const waveEl = document.getElementById('wave');
        const shopEl = document.getElementById('shop');
        const overlay = document.getElementById('overlay');
        const resultText = document.getElementById('result-text');

        // Game Config & State
        let money = 150;
        let startingMoney = 150;
        let lives = 10;
        let wave = 1;
        let enemies = [];
        let towers = [];
        let projectiles = [];
        let selectedTowerType = null;
        let frameCount = 0;
        let moneyMultiplier = 1.0;
        let gameStarted = false;

        const path = [{x:0,y:200}, {x:200,y:200}, {x:200,y:100}, {x:500,y:100}, {x:500,y:300}, {x:800,y:300}];

        const TOWER_TYPES = {
            basic:  { name: "Basic",   color: "#00f2ff", cost: 50,  range: 120, fireRate: 30, damage: 10, type: 'normal' },
            sniper: { name: "Sniper",  color: "#00ff00", cost: 100, range: 250, fireRate: 80, damage: 40, type: 'normal' },
            rapid:  { name: "Rapid",   color: "#ff0000", cost: 80,  range: 100, fireRate: 10, damage: 4,  type: 'normal' },
            splash: { name: "Splash",  color: "#ffff00", cost: 120, range: 110, fireRate: 50, damage: 15, type: 'aoe' },
            frost:  { name: "Frost",   color: "#aa00ff", cost: 90,  range: 110, fireRate: 40, damage: 2,  type: 'slow' },
            tesla:  { name: "Tesla",   color: "#00ffff", cost: 150, range: 130, fireRate: 40, damage: 25, type: 'tesla' }
        };

        const ENEMY_TYPES = [
            { name: 'scout', color: '#ff8888', speed: 2.5, hp: 15, radius: 8 },
            { name: 'grunt', color: '#ffffff', speed: 1.5, hp: 40, radius: 12 },
            { name: 'tank',  color: '#555555', speed: 0.7, hp: 200, radius: 18 }
        ];

        // Gamble Functionality
        function gamble() {
            const isHeads = Math.random() < 0.5;
            if (isHeads) {
                moneyMultiplier = 1.25;
                resultText.innerHTML = "<span style='color:#00f2ff'>HEADS! 1.25x Money Multiplier!</span>";
            } else {
                startingMoney += 250; // Cost of 5 basic towers
                resultText.innerHTML = "<span style='color:#ff00ff'>TAILS! 5 Free Towers ($250)!</span>";
            }
        }

        function startGame() {
            money = startingMoney;
            moneyEl.innerText = money;
            overlay.style.display = 'none';
            gameStarted = true;
            spawnWave();
            gameLoop();
        }

        // Initialization
        Object.keys(TOWER_TYPES).forEach(key => {
            const t = TOWER_TYPES[key];
            const btn = document.createElement('div');
            btn.className = 'tower-btn';
            btn.innerHTML = `<span>${t.name}</span>$${t.cost}`;
            btn.onclick = () => {
                document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                if(selectedTowerType === key) {
                    selectedTowerType = null;
                } else {
                    selectedTowerType = key;
                    btn.classList.add('selected');
                }
            };
            btn.id = `btn-${key}`;
            shopEl.appendChild(btn);
        });

        class Enemy {
            constructor(waveNum) {
                const type = waveNum % 10 === 0 ? ENEMY_TYPES[2] : (waveNum % 4 === 0 ? ENEMY_TYPES[0] : ENEMY_TYPES[1]);
                this.x = path[0].x; this.y = path[0].y;
                this.pathIndex = 0;
                this.speed = type.speed * (1 + (waveNum * 0.05));
                this.maxHp = type.hp * (1 + (waveNum * 0.2));
                this.hp = this.maxHp;
                this.radius = type.radius;
                this.color = type.color;
                this.slowed = false;
            }
            update() {
                let currentSpeed = this.slowed ? this.speed * 0.5 : this.speed;
                this.slowed = false;
                let target = path[this.pathIndex + 1];
                if (!target) return;
                let dx = target.x - this.x; let dy = target.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < currentSpeed) {
                    this.pathIndex++;
                    if (this.pathIndex >= path.length - 1) {
                        lives--; livesEl.innerText = lives; this.hp = 0;
                    }
                } else {
                    this.x += (dx / dist) * currentSpeed; this.y += (dy / dist) * currentSpeed;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'red'; ctx.fillRect(this.x - 10, this.y - 20, 20, 3);
                ctx.fillStyle = 'lime'; ctx.fillRect(this.x - 10, this.y - 20, (this.hp / this.maxHp) * 20, 3);
            }
        }

        class Tower {
            constructor(x, y, config) {
                this.x = x; this.y = y; this.type = config.type; this.color = config.color;
                this.range = config.range; this.fireRate = config.fireRate; this.damage = config.damage;
                this.cooldown = 0; this.level = 1; this.costToUpgrade = Math.floor(config.cost * 1.5);
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
                ctx.fillStyle = "white"; ctx.font = "10px Arial";
                ctx.fillText("L" + this.level, this.x - 7, this.y + 5);
            }
            update() {
                if (this.cooldown > 0) this.cooldown--;
                if (this.cooldown <= 0) {
                    let target = enemies.find(e => Math.hypot(e.x - this.x, e.y - this.y) < this.range);
                    if (target) {
                        projectiles.push(new Projectile(this.x, this.y, target, this));
                        this.cooldown = this.fireRate;
                    }
                }
            }
            upgrade() {
                if (money >= this.costToUpgrade) {
                    money -= this.costToUpgrade; moneyEl.innerText = money;
                    this.level++; this.damage *= 1.5; this.range *= 1.1; this.fireRate *= 0.9;
                    this.costToUpgrade = Math.floor(this.costToUpgrade * 1.8);
                }
            }
        }

        class Projectile {
            constructor(x, y, target, tower) {
                this.x = x; this.y = y; this.target = target; this.speed = 7;
                this.damage = tower.damage; this.type = tower.type; this.color = tower.color; this.active = true;
            }
            update() {
                let dx = this.target.x - this.x; let dy = this.target.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < this.speed) {
                    if (this.type === 'aoe') {
                        enemies.forEach(e => { if (Math.hypot(e.x - this.x, e.y - this.y) < 50) e.hp -= this.damage; });
                    } else {
                        this.target.hp -= this.damage;
                        if (this.type === 'slow') this.target.slowed = true;
                    }
                    this.active = false;
                } else {
                    this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                }
            }
            draw() {
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
            }
        }

        function spawnWave() {
            if (enemies.length === 0) {
                wave++; waveEl.innerText = wave;
                if (wave === 30) { money += 500; moneyEl.innerText = money; alert("💰 WAVE 30 BONUS: $500!"); }
                for (let i = 0; i < 5 + wave; i++) {
                    setTimeout(() => { if(gameStarted) enemies.push(new Enemy(wave)); }, i * 800);
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            if (!gameStarted) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;
            let clickedTower = towers.find(t => Math.hypot(t.x - x, t.y - y) < 20);
            if (clickedTower) { clickedTower.upgrade(); return; }
            if (selectedTowerType) {
                const config = TOWER_TYPES[selectedTowerType];
                if (money >= config.cost) {
                    towers.push(new Tower(x, y, config));
                    money -= config.cost; moneyEl.innerText = money;
                }
            }
        });

        function gameLoop() {
            if (!gameStarted) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 40; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
            path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

            towers.forEach(t => { t.update(); t.draw(); });

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update(); enemies[i].draw();
                if (enemies[i].hp <= 0) {
                    if (enemies[i].hp <= 0 && enemies[i].pathIndex < path.length - 1) {
                        // APPLY MULTIPLIER HERE
                        money += Math.floor(15 * moneyMultiplier);
                        moneyEl.innerText = money;
                    }
                    enemies.splice(i, 1);
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                projectiles[i].update(); projectiles[i].draw();
                if (!projectiles[i].active || projectiles[i].target.hp <= 0) projectiles.splice(i, 1);
            }

            if (lives <= 0) {
                ctx.fillStyle = "white"; ctx.font = "50px Arial";
                ctx.fillText("GAME OVER", 250, 200);
                gameStarted = false;
                return;
            }

            if (enemies.length === 0 && frameCount > 200) spawnWave();
            frameCount++;
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
